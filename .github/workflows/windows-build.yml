name: Windows Build

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install NSIS (if missing)
        run: choco install nsis -y

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1

      - name: Determine Windows SDK version
        shell: pwsh
        run: |
          $path = 'C:\Program Files (x86)\Windows Kits\10\Include'
          if (Test-Path $path) {
            $versions = Get-ChildItem $path | Where-Object {$_.PSIsContainer} | Select-Object -ExpandProperty Name
            # Sort as Version to pick the highest proper version
            $sdk = ($versions | Sort-Object {[version]$_} -Descending)[0]
            Write-Host "Detected Windows SDK: $sdk"
            "WINSDK_VER=$sdk" | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            Write-Host "Windows SDK include path not found, falling back to 10.0.18362.0"
            "WINSDK_VER=10.0.18362.0" | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf8 -Append
          }

        - name: Build MinHook from source
          shell: pwsh
          run: |
            git clone --depth 1 https://github.com/TsudaKageyu/minhook.git third_party/minhook
            $sln = Get-ChildItem -Path third_party/minhook -Recurse -Filter *.sln | Select-Object -First 1
            if (-not $sln) { Write-Error "MinHook solution not found"; exit 1 }
            foreach ($plat in @('x64','Win32')) {
              msbuild $sln.FullName /p:Configuration=Release /p:Platform=$plat /p:PlatformToolset=v143 /p:WindowsTargetPlatformVersion=$env:WINSDK_VER /m
              $lib = Get-ChildItem -Path third_party/minhook -Recurse -Filter *.lib | Where-Object { $_.DirectoryName -match $plat -and $_.Name -match 'MinHook' } | Select-Object -First 1
              if (-not $lib) { $lib = Get-ChildItem -Path third_party/minhook -Recurse -Filter *.lib | Where-Object { $_.Name -match 'MinHook' } | Select-Object -First 1 }
              if (-not $lib) { Write-Error "Built MinHook lib not found for platform $plat"; exit 1 }
              if ($plat -eq 'x64') { $dest = 'lib\MinHook\lib\libMinHook-x64-v141-md.lib' } else { $dest = 'lib\MinHook\lib\libMinHook-x86-v141-md.lib' }
              Copy-Item $lib.FullName $dest -Force
              Write-Host "Copied $($lib.FullName) -> $dest"
            }

      - name: Build x64 (Release)
        shell: pwsh
        run: msbuild OpenVR-SpaceCalibrator.sln /p:Configuration=Release /p:Platform=x64 /p:WindowsTargetPlatformVersion=$env:WINSDK_VER /p:PlatformToolset=v143 /m

      - name: Build x86 (Release)
        shell: pwsh
        run: msbuild OpenVR-SpaceCalibrator.sln /p:Configuration=Release /p:Platform=Win32 /p:WindowsTargetPlatformVersion=$env:WINSDK_VER /p:PlatformToolset=v143 /m

      - name: Package x64 Release
        run: |
          if (Test-Path x64\Release) { Compress-Archive -Path x64\Release\* -DestinationPath release-x64.zip -Force } else { Write-Error "x64\\Release not found" }

      - name: Package x86 Release
        run: |
          if (Test-Path x86\Release) { Compress-Archive -Path x86\Release\* -DestinationPath release-x86.zip -Force } else { Write-Error "x86\\Release not found" }

      - name: Build NSIS installer
        run: |
          makensis install\installer.nsi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenVR-SpaceCalibrator-artifacts
          path: |
            release-x64.zip
            release-x86.zip
            OpenVR-SpaceCalibrator.exe
